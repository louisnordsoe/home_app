name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  checks:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: cp .env.example .env

      - run: npm run format:check
      - run: npm run lint
      - run: npm run check
      - run: npm run knip
      - run: npm run secrets
